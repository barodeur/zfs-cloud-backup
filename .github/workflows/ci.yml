name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zfsutils-linux age
          sudo modprobe zfs
          arch=$(dpkg --print-architecture)
          curl -fsSL "https://dl.min.io/client/mc/release/linux-${arch}/mc" -o /tmp/mc
          sudo install /tmp/mc /usr/local/bin/mc

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build
        run: nix develop --command cargo build --release

      - name: Cache MinIO Docker image
        uses: actions/cache@v4
        with:
          path: /tmp/minio.tar
          key: minio-${{ hashFiles('tests/docker-compose.yml') }}

      - name: Load or pull MinIO image
        run: |
          if [ -f /tmp/minio.tar ]; then
            docker load -i /tmp/minio.tar
          else
            docker pull minio/minio:latest
            docker save minio/minio:latest -o /tmp/minio.tar
          fi

      - name: Start MinIO
        run: |
          docker run -d -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done

      - name: Run integration tests
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          ZCB_ENDPOINT: http://localhost:9000
          ZCB_BUCKET: test-backups
          ZCB_REGION: us-east-1
        run: |
          export PATH="$PWD/target/release:$PATH"
          sudo -E tests/integration-test.sh

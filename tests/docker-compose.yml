services:
  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10

  test:
    build:
      context: ..
      dockerfile: tests/Dockerfile
    privileged: true
    volumes:
      - /dev:/dev
    depends_on:
      minio:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      ZCB_ENDPOINT: http://minio:9000
      ZCB_BUCKET: test-backups
      ZCB_REGION: us-east-1
